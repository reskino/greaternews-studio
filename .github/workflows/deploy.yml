name: Deploy studio to GitHub Pages

# Builds the studio and publishes dist/ to GitHub Pages on every push to main,
# so changes to the app take effect automatically (no manual upload).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci): the committed lockfile omits some Linux-only
      # optional deps (esbuild binaries), which would make `npm ci` fail on the runner.
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          # Baked into the bundle. Set these as repo secrets (Settings -> Secrets and
          # variables -> Actions). The Google key must be referrer-restricted to the
          # Pages domain + Custom Search API only, so exposure in the bundle is safe.
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_GOOGLE_CSE_KEY: ${{ secrets.VITE_GOOGLE_CSE_KEY }}
          VITE_GOOGLE_CSE_CX: ${{ secrets.VITE_GOOGLE_CSE_CX }}
          VITE_SERPER_API_KEY: ${{ secrets.VITE_SERPER_API_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
